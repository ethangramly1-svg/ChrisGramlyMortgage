<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | Chris Gramly</title>
  <link rel="icon" href="assets/chris-gramly.png">
  <style>
    :root {
      --navy: #10243e;
      --teal: #0c7c82;
      --gold: #dfb65e;
      --mint: #dff6ee;
      --white: #ffffff;
      --x: 50%;
      --y: 50%;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 28px;
      color: var(--white);
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at var(--x) var(--y), rgba(223, 182, 94, 0.28), transparent 18%),
        linear-gradient(135deg, #07172a 0%, #10243e 42%, #0c7c82 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .cursor-glow {
      position: fixed;
      width: 220px;
      height: 220px;
      left: var(--x);
      top: var(--y);
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(223,182,94,0.34), transparent 65%);
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      filter: blur(10px);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      padding: 44px;
      text-align: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 18px;
      background: rgba(255,255,255,0.13);
      box-shadow: 0 28px 80px rgba(0,0,0,0.34);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.38), transparent);
      transform: translateX(-100%);
      animation: shine 5s ease-in-out infinite;
      pointer-events: none;
    }

    .badge {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      margin: 0 auto 24px;
      color: var(--navy);
      background: linear-gradient(135deg, var(--gold), var(--mint));
      border-radius: 50%;
      box-shadow: 0 18px 45px rgba(223,182,94,0.3);
      font-size: 42px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 54px;
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      max-width: 560px;
      margin: 0 auto 14px;
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255,255,255,0.86);
    }

    strong {
      color: #fff2bd;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 14px 20px;
      color: var(--navy);
      background: var(--gold);
      border-radius: 10px;
      text-decoration: none;
      font-weight: 900;
      box-shadow: 0 16px 36px rgba(223,182,94,0.24);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    a.secondary {
      color: var(--white);
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.28);
    }

    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 46px rgba(0,0,0,0.24);
    }

    .orb {
      position: fixed;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.24);
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .orb.one {
      top: 12%;
      left: 10%;
    }

    .orb.two {
      right: 8%;
      bottom: 12%;
      width: 240px;
      height: 240px;
      animation-delay: -3s;
    }

    @keyframes shine {
      0%, 55% { transform: translateX(-100%); }
      80%, 100% { transform: translateX(100%); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.55; }
      50% { transform: translateY(-22px) scale(1.06); opacity: 0.9; }
    }

    @media (max-width: 620px) {
      .card {
        padding: 34px 22px;
      }

      h1 {
        font-size: 40px;
      }

      p {
        font-size: 16px;
      }

      .actions a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main class="card">
    <div class="badge">✓</div>
    <h1>Thank You</h1>
    <p>Your message has been received. Chris Gramly will follow up with you soon.</p>
    <p>For faster help, call Chris directly at <strong>(702) 767-4072</strong>.</p>

    <div class="actions">
      <a href="index.html">Back to Home</a>
      <a class="secondary" href="tel:+17027674072">Call Chris</a>
    </div>
  </main>

  <script>
    const root = document.documentElement;

    window.addEventListener("pointermove", (event) => {
      root.style.setProperty("--x", `${event.clientX}px`);
      root.style.setProperty("--y", `${event.clientY}px`);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | Chris Gramly</title>
  <meta name="theme-color" content="#07172a">
  <link rel="icon" href="assets/chris-gramly.png">
  <style>
    :root {
      --navy: #10243e;
      --navy-deep: #07172a;
      --teal: #0c7c82;
      --teal-neon: #2ce6c8;
      --gold: #dfb65e;
      --gold-neon: #ffcf6b;
      --mint: #dff6ee;
      --white: #ffffff;
      --x: 50%;
      --y: 50%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 28px;
      color: var(--white);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at var(--x) var(--y), rgba(255, 207, 107, 0.32), transparent 22%),
        linear-gradient(135deg, var(--navy-deep) 0%, var(--navy) 42%, var(--teal) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
    }

    .aurora-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: floatBlob 16s ease-in-out infinite;
    }

    .aurora-blob.a {
      top: 10%;
      left: -5%;
      width: 460px;
      height: 460px;
      background: radial-gradient(circle, rgba(44, 230, 200, 0.55), transparent 70%);
    }

    .aurora-blob.b {
      bottom: -8%;
      right: -6%;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(255, 207, 107, 0.5), transparent 70%);
      animation-delay: -7s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(40px, -50px, 0) scale(1.08); }
    }

    .cursor-glow {
      position: fixed;
      width: 240px;
      height: 240px;
      left: var(--x);
      top: var(--y);
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,207,107,0.32), rgba(44,230,200,0.18) 40%, transparent 70%);
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      filter: blur(10px);
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(720px, 100%);
      padding: 52px 44px;
      text-align: center;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.32);
      border-radius: 24px;
      background: rgba(255,255,255,0.13);
      box-shadow:
        0 32px 90px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.18);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      transform-style: preserve-3d;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
      transform: translateX(-100%);
      animation: shine 5s ease-in-out infinite;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: conic-gradient(from 0deg, transparent 0deg, rgba(44, 230, 200, 0.32) 90deg, transparent 180deg, rgba(255, 207, 107, 0.32) 270deg, transparent 360deg);
      filter: blur(22px);
      z-index: -1;
      opacity: 0.6;
      animation: spin 14s linear infinite;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .badge {
      width: 90px;
      height: 90px;
      display: grid;
      place-items: center;
      margin: 0 auto 26px;
      color: var(--navy);
      background: linear-gradient(135deg, var(--gold-neon), var(--mint));
      border-radius: 50%;
      box-shadow:
        0 18px 45px rgba(255,207,107,0.4),
        inset 0 1px 0 rgba(255,255,255,0.6);
      font-size: 48px;
      font-weight: 900;
      animation: pulseBadge 2.4s ease-in-out infinite;
    }

    @keyframes pulseBadge {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 45px rgba(255,207,107,0.4), inset 0 1px 0 rgba(255,255,255,0.6); }
      50% { transform: scale(1.04); box-shadow: 0 24px 60px rgba(255,207,107,0.55), 0 0 32px rgba(44,230,200,0.4), inset 0 1px 0 rgba(255,255,255,0.6); }
    }

    h1 {
      margin: 0 0 18px;
      font-size: 62px;
      line-height: 1;
      letter-spacing: -0.02em;
      font-weight: 900;
      background: linear-gradient(135deg, #ffffff 25%, var(--gold-neon) 75%, var(--teal-neon) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      max-width: 560px;
      margin: 0 auto 14px;
      font-size: 18px;
      line-height: 1.65;
      color: rgba(255,255,255,0.88);
    }

    strong { color: var(--gold-neon); }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 32px;
    }

    a {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 22px;
      color: var(--navy);
      background: linear-gradient(135deg, var(--gold-neon), var(--gold) 70%);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 900;
      box-shadow:
        0 16px 36px rgba(255,207,107,0.32),
        inset 0 1px 0 rgba(255,255,255,0.5);
      overflow: hidden;
      transition: transform 240ms cubic-bezier(.2,.8,.2,1), box-shadow 240ms ease;
    }

    a.secondary {
      color: var(--white);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.32);
      box-shadow: none;
      backdrop-filter: blur(12px);
    }

    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 26px 56px rgba(255,207,107,0.42), 0 0 32px rgba(44,230,200,0.18);
    }

    a.secondary:hover {
      background: rgba(44,230,200,0.18);
      border-color: rgba(44,230,200,0.45);
    }

    @keyframes shine {
      0%, 55% { transform: translateX(-100%); }
      80%, 100% { transform: translateX(100%); }
    }

    @media (max-width: 620px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 44px; }
      p { font-size: 16px; }
      .actions a { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <span class="aurora-blob a" aria-hidden="true"></span>
  <span class="aurora-blob b" aria-hidden="true"></span>
  <div class="cursor-glow" aria-hidden="true"></div>

  <main class="card">
    <div class="badge">&check;</div>
    <h1>Thank You</h1>
    <p>Your message has been received. Chris Gramly will follow up with you soon.</p>
    <p>For faster help, call Chris directly at <strong>(702) 767-4072</strong>.</p>

    <div class="actions">
      <a href="index.html">Back to Home</a>
      <a class="secondary" href="tel:+17027674072">Call Chris</a>
    </div>
  </main>

  <script>
    const root = document.documentElement;
    window.addEventListener("pointermove", (event) => {
      root.style.setProperty("--x", `${event.clientX}px`);
      root.style.setProperty("--y", `${event.clientY}px`);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | Chris Gramly</title>
  <meta name="theme-color" content="#0c0f10">
  <link rel="icon" href="assets/chris-gramly.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;600&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f10;
      --surface: #191c1d;
      --ink: #e1e3e4;
      --ink-soft: #c6c6ca;
      --ink-mute: #8f9094;
      --outline: #2a2c2e;
      --gold: #e9c176;
      --font-display: "Bodoni Moda", Georgia, serif;
      --font-sans: "Inter", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
      color: var(--ink);
      font-family: var(--font-sans);
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(800px circle at 20% 30%, rgba(233, 193, 118, 0.08), transparent 60%),
        radial-gradient(700px circle at 80% 80%, rgba(60, 80, 120, 0.10), transparent 60%);
      pointer-events: none;
    }
    .card {
      position: relative;
      width: min(620px, 100%);
      padding: 64px 56px;
      text-align: left;
      background: rgba(17, 20, 21, 0.85);
      border: 1px solid var(--outline);
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
    }
    .tag {
      display: block;
      margin-bottom: 32px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
    }
    h1 {
      margin: 0 0 24px;
      font-family: var(--font-display);
      font-size: clamp(42px, 6vw, 64px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    p {
      margin: 0 0 18px;
      font-weight: 300;
      font-size: 17px;
      line-height: 1.65;
      color: var(--ink-soft);
    }
    strong {
      font-family: var(--font-display);
      font-weight: 500;
      color: var(--gold);
    }
    .divider {
      height: 1px;
      background: var(--outline);
      margin: 36px 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    a.btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 26px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid transparent;
      transition: background 220ms ease, color 220ms ease, border-color 220ms ease, transform 220ms ease;
    }
    a.btn.primary {
      background: var(--gold);
      color: #2a1a00;
    }
    a.btn.primary:hover { background: #f3d08c; transform: translateY(-2px); }
    a.btn.ghost {
      color: var(--gold);
      border-color: var(--gold);
    }
    a.btn.ghost:hover {
      background: rgba(233, 193, 118, 0.08);
      transform: translateY(-2px);
    }
    @media (max-width: 520px) {
      .card { padding: 48px 28px; }
      .actions { flex-direction: column; }
      a.btn { width: 100%; justify-content: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="tag">Received &nbsp;·&nbsp; Ground Floor</span>
    <h1>Thank you.</h1>
    <p>Your message has been received. Chris Gramly will follow up with you soon to discuss the details of your loan.</p>
    <p>For faster help, call Chris directly at <strong>(702) 767-4072</strong>.</p>

    <div class="divider"></div>

    <div class="actions">
      <a class="btn primary" href="index.html">Back to home</a>
      <a class="btn ghost" href="tel:+17027674072">Call Chris</a>
    </div>
  </main>
</body>
</html>
